<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('동행 신청 관리')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
    <div class="container">
        <div class="surface-card p-4 p-md-5 mb-4">
            <div class="travel-visual mb-4"></div>
            <div class="d-flex flex-column flex-lg-row justify-content-between gap-3">
                <div>
                    <span class="badge badge-soft mb-3">Request management</span>
                    <h1 class="h2 fw-bold mb-2">동행 신청 관리</h1>
                    <p class="lead-muted mb-0">
                        <strong th:text="${post.title}"></strong>
                    </p>
                </div>
                <div class="stat-card">
                    <span class="stat-value" th:text="${participantCount}"></span>
                    <span class="stat-label">현재 참여자</span>
                </div>
            </div>
        </div>

        <div class="d-flex flex-wrap gap-2 mb-4">
            <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-outline-secondary">상세로 돌아가기</a>
            <a href="/posts" class="btn btn-secondary">목록</a>
        </div>

        <div th:if="${#lists.isEmpty(requestList)}" class="surface-card p-5 text-center">
            <h2 class="h5 fw-bold">아직 동행 신청이 없습니다.</h2>
            <p class="lead-muted mb-0">새 신청이 들어오면 이곳에서 승인하거나 거절할 수 있습니다.</p>
        </div>

        <div th:if="${!#lists.isEmpty(requestList)}" class="surface-card overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>신청자</th>
                        <th>메시지</th>
                        <th>상태</th>
                        <th>신청일</th>
                        <th>관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="request : ${requestList}">
                        <td>
                            <strong th:text="${request.user_name}"></strong>
                            <div class="text-muted small" th:text="${request.email}"></div>
                        </td>
                        <td class="content-box" th:text="${request.message}"></td>
                        <td>
                            <span th:if="${request.status == 'PENDING'}" class="badge bg-warning text-dark">PENDING</span>
                            <span th:if="${request.status == 'APPROVED'}" class="badge bg-success">APPROVED</span>
                            <span th:if="${request.status == 'REJECTED'}" class="badge bg-danger">REJECTED</span>
                        </td>
                        <td th:text="${request.created_at}"></td>
                        <td>
                            <form th:if="${request.status == 'PENDING'}"
                                  th:action="@{/posts/{postId}/requests/{requestId}/approve(postId=${post.id}, requestId=${request.id})}"
                                  method="post"
                                  style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-success">승인</button>
                            </form>

                            <form th:if="${request.status == 'PENDING'}"
                                  th:action="@{/posts/{postId}/requests/{requestId}/reject(postId=${post.id}, requestId=${request.id})}"
                                  method="post"
                                  style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-danger">거절</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
