<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 북마크</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>내 북마크</h2>

    <div class="mb-3">
        <a href="/" class="btn btn-outline-secondary">홈</a>
        <a href="/posts" class="btn btn-primary">동행 모집 목록</a>
    </div>

    <div th:if="${#lists.isEmpty(favoriteList)}" class="alert alert-secondary">
        북마크한 게시글이 없습니다.
    </div>

    <table th:if="${!#lists.isEmpty(favoriteList)}" class="table table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>제목</th>
            <th>작성자</th>
            <th>기간</th>
            <th>모집인원</th>
            <th>조회수</th>
            <th>북마크일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${favoriteList}">
            <td th:text="${post.id}"></td>
            <td>
                <a th:href="@{/posts/{id}(id=${post.id})}"
                   th:text="${post.title}"></a>
            </td>
            <td th:text="${post.user_name}"></td>
            <td>
                <span th:text="${post.start_date}"></span>
                ~
                <span th:text="${post.end_date}"></span>
            </td>
            <td th:text="${post.max_people}"></td>
            <td th:text="${post.view_count}"></td>
            <td th:text="${post.favorited_at}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
