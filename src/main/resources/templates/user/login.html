<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('로그인')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
  <div class="container">
    <div class="surface-card auth-card p-4 p-md-5">
      <div class="text-center mb-4">
        <span class="badge badge-soft mb-3">Travory</span>
        <h1 class="h3 fw-bold">로그인</h1>
        <p class="lead-muted mb-0">관심 있는 여행과 동행 신청을 이어서 확인하세요.</p>
      </div>

      <form action="/users/login" method="post">
        <div class="mb-3">
          <label class="form-label">아이디</label>
          <input type="text" class="form-control form-control-lg" name="userId">
        </div>

        <div class="mb-4">
          <label class="form-label">비밀번호</label>
          <input type="password" class="form-control form-control-lg" name="password">
        </div>

        <button class="btn btn-primary btn-lg w-100">로그인</button>
      </form>

      <div class="text-center mt-4">
        <span class="lead-muted">아직 계정이 없나요?</span>
        <a href="/users/register" class="fw-bold text-decoration-none">회원가입</a>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
