<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>동행 신청 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>동행 신청 관리</h2>

    <div class="mb-3">
        <strong th:text="${post.title}"></strong>
        <span class="ms-3">현재 참여자: </span>
        <span th:text="${participantCount}"></span>
    </div>

    <div class="mb-3">
        <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-outline-secondary">상세로 돌아가기</a>
        <a href="/posts" class="btn btn-secondary">목록</a>
    </div>

    <div th:if="${#lists.isEmpty(requestList)}" class="alert alert-secondary">
        아직 동행 신청이 없습니다.
    </div>

    <table th:if="${!#lists.isEmpty(requestList)}" class="table table-hover">
        <thead>
        <tr>
            <th>신청자</th>
            <th>메시지</th>
            <th>상태</th>
            <th>신청일</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="request : ${requestList}">
            <td>
                <strong th:text="${request.user_name}"></strong>
                <div class="text-muted" th:text="${request.email}"></div>
            </td>
            <td th:text="${request.message}"></td>
            <td>
                <span th:if="${request.status == 'PENDING'}" class="badge bg-warning text-dark">PENDING</span>
                <span th:if="${request.status == 'APPROVED'}" class="badge bg-success">APPROVED</span>
                <span th:if="${request.status == 'REJECTED'}" class="badge bg-danger">REJECTED</span>
            </td>
            <td th:text="${request.created_at}"></td>
            <td>
                <form th:if="${request.status == 'PENDING'}"
                      th:action="@{/posts/{postId}/requests/{requestId}/approve(postId=${post.id}, requestId=${request.id})}"
                      method="post"
                      style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-success">승인</button>
                </form>

                <form th:if="${request.status == 'PENDING'}"
                      th:action="@{/posts/{postId}/requests/{requestId}/reject(postId=${post.id}, requestId=${request.id})}"
                      method="post"
                      style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger">거절</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
