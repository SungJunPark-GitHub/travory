<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('동행 모집 작성')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="surface-card p-4 p-md-5">
          <div class="travel-visual mb-4"></div>
          <div class="mb-4">
            <span class="badge badge-soft mb-3">New trip</span>
            <h1 class="h3 fw-bold">동행 모집 작성</h1>
            <p class="lead-muted mb-0">여행 일정과 예산을 공유하고 함께 떠날 동행을 모집하세요.</p>
          </div>

          <form action="/posts/create" method="post">
            <div class="mb-3">
              <label class="form-label">제목</label>
              <input type="text" name="title" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">내용</label>
              <textarea name="content" class="form-control" rows="6"></textarea>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">여행 시작일</label>
                <input type="date" name="startDate" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">여행 종료일</label>
                <input type="date" name="endDate" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">모집 인원</label>
                <input type="number" name="maxPeople" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">예상 비용</label>
                <input type="number" name="budget" class="form-control">
              </div>
            </div>

            <div class="d-flex flex-wrap gap-2 mt-4">
              <button class="btn btn-primary">등록</button>
              <a href="/posts" class="btn btn-outline-secondary">목록</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
