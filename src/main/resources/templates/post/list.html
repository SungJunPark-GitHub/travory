<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('동행 모집 목록')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
  <div class="container">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
      <div>
        <span class="badge badge-soft mb-3">Travel boards</span>
        <h1 class="h2 fw-bold mb-2">동행 모집 목록</h1>
        <p class="lead-muted mb-0">일정과 취향이 맞는 여행 동행을 찾아보세요.</p>
      </div>
      <div class="d-flex gap-2">
        <a href="/" class="btn btn-outline-secondary">홈</a>
        <a href="/posts/create" class="btn btn-primary">글쓰기</a>
      </div>
    </div>

    <form action="/posts" method="get" class="surface-card p-3 mb-4">
      <div class="row g-2 align-items-center">
        <div class="col-md">
          <input type="text"
                 name="keyword"
                 class="form-control"
                 placeholder="제목, 내용, 작성자로 검색"
                 th:value="${keyword}">
        </div>
        <div class="col-md-auto">
          <select name="sort" class="form-select">
            <option value="latest" th:selected="${sort == 'latest'}">최신순</option>
            <option value="view" th:selected="${sort == 'view'}">조회순</option>
            <option value="like" th:selected="${sort == 'like'}">좋아요순</option>
          </select>
        </div>
        <div class="col-md-auto">
          <button type="submit" class="btn btn-primary w-100">검색</button>
        </div>
        <div class="col-md-auto">
          <a href="/posts" class="btn btn-outline-secondary w-100">초기화</a>
        </div>
      </div>
    </form>

    <div class="surface-card overflow-hidden">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>제목</th>
            <th>작성자</th>
            <th>상태</th>
            <th>기간</th>
            <th>모집인원</th>
            <th>조회수</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="post : ${postList}">
            <td class="text-muted" th:text="${post.id}"></td>
            <td>
              <a class="post-title-link"
                 th:href="@{/posts/{id}(id=${post.id})}"
                 th:text="${post.title}"></a>
            </td>
            <td th:text="${post.user_name}"></td>
            <td>
              <span th:if="${post.status == 'OPEN'}" class="badge bg-success">모집중</span>
              <span th:if="${post.status == 'CLOSED'}" class="badge bg-secondary">모집완료</span>
              <span th:if="${post.status == 'FINISHED'}" class="badge bg-dark">여행종료</span>
            </td>
            <td>
              <span th:text="${post.start_date}"></span>
              ~
              <span th:text="${post.end_date}"></span>
            </td>
            <td>
              <span th:text="${post.max_people}"></span>
              <span class="text-muted">명</span>
            </td>
            <td th:text="${post.view_count}"></td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4" aria-label="Post pagination">
      <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
          <a class="page-link" th:href="@{/posts(page=${currentPage - 1}, keyword=${keyword}, sort=${sort})}">Previous</a>
        </li>

        <li class="page-item"
            th:each="pageNumber : ${#numbers.sequence(startPage, endPage)}"
            th:classappend="${pageNumber == currentPage} ? 'active'">
          <a class="page-link"
             th:href="@{/posts(page=${pageNumber}, keyword=${keyword}, sort=${sort})}"
             th:text="${pageNumber}"></a>
        </li>

        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
          <a class="page-link" th:href="@{/posts(page=${currentPage + 1}, keyword=${keyword}, sort=${sort})}">Next</a>
        </li>
      </ul>
    </nav>
  </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
