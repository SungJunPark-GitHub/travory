<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('여행 일정 관리')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
    <div class="container">
        <div class="surface-card p-4 p-md-5 mb-4">
            <div class="travel-visual mb-4"></div>
            <div class="d-flex flex-column flex-md-row justify-content-between gap-3">
                <div>
                    <span class="badge badge-soft mb-3">Itinerary</span>
                    <h1 class="h2 fw-bold mb-2">여행 일정 관리</h1>
                    <p class="lead-muted mb-0" th:text="${post.title}"></p>
                </div>
                <div class="d-flex align-items-start gap-2">
                    <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-outline-secondary">상세로 돌아가기</a>
                    <form th:action="@{/posts/{postId}/itinerary/days(postId=${post.id})}" method="post">
                        <button type="submit" class="btn btn-primary">Day 추가</button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(itineraryDays)}" class="surface-card p-5 text-center">
            <h2 class="h5 fw-bold">아직 등록된 일정이 없습니다.</h2>
            <p class="lead-muted mb-0">Day를 추가하고 장소별 일정을 입력해보세요.</p>
        </div>

        <div class="row g-4" th:if="${!#lists.isEmpty(itineraryDays)}">
            <div class="col-lg-6" th:each="day : ${itineraryDays}">
                <section class="surface-card p-4 h-100">
                    <h2 class="h4 fw-bold mb-3">
                        Day <span th:text="${day.dayNumber}"></span>
                    </h2>

                    <div th:if="${#lists.isEmpty(day.itemList)}" class="alert alert-secondary">
                        아직 일정 항목이 없습니다.
                    </div>

                    <div class="list-group mb-4" th:if="${!#lists.isEmpty(day.itemList)}">
                        <div class="list-group-item" th:each="item : ${day.itemList}">
                            <div class="d-flex justify-content-between gap-3">
                                <div>
                                    <span class="badge badge-soft mb-2">
                                        #<span th:text="${item.orderNumber}"></span>
                                    </span>
                                    <h3 class="h6 fw-bold mb-1" th:text="${item.placeName}"></h3>
                                    <p class="mb-0 text-muted content-box" th:text="${item.memo}"></p>
                                    <a th:href="@{https://www.google.com/maps/search/(api=1,query=${item.placeName})}"
                                       target="_blank"
                                       rel="noopener noreferrer"
                                       class="btn btn-sm btn-outline-primary mt-2">
                                        Google Maps
                                    </a>
                                </div>
                                <form th:action="@{/posts/{postId}/itinerary/items/{itemId}/delete(postId=${post.id}, itemId=${item.id})}"
                                      method="post">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/posts/{postId}/itinerary/items(postId=${post.id})}" method="post">
                        <input type="hidden" name="dayId" th:value="${day.id}">

                        <div class="row g-2">
                            <div class="col-md-8">
                                <label class="form-label">장소명</label>
                                <input type="text" name="placeName" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">순서</label>
                                <input type="number" name="orderNumber" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label">메모</label>
                                <textarea name="memo" class="form-control" rows="3"></textarea>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary mt-3">일정 추가</button>
                    </form>
                </section>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
