<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Travory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/travory.css}">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light border-bottom sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Travory</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#travoryNavbar"
                aria-controls="travoryNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="travoryNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/posts">동행 모집</a>
                </li>
                <li class="nav-item" th:if="${session.loginUser != null}">
                    <a class="nav-link" href="/favorites">내 북마크</a>
                </li>
                <li class="nav-item" th:if="${session.loginUser != null}">
                    <a class="nav-link" href="/mypage">마이페이지</a>
                </li>
                <li class="nav-item" th:if="${session.loginUser != null}">
                    <a class="nav-link" href="/mypage/calendar">여행 캘린더</a>
                </li>
                <li class="nav-item" th:if="${session.loginUser != null}">
                    <a class="nav-link" href="/mypage/chats">내 채팅</a>
                </li>
                <li class="nav-item" th:if="${session.loginUser != null}">
                    <a class="nav-link" href="/notifications">
                        알림
                        <span th:if="${unreadNotificationCount > 0}"
                              class="badge bg-primary"
                              th:text="${unreadNotificationCount}"></span>
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-2">
                <span class="navbar-text small" th:if="${session.loginUser != null}">
                    <strong th:text="${session.loginUser.userName}"></strong>님
                </span>
                <a th:if="${session.loginUser == null}" href="/users/login" class="btn btn-outline-primary btn-sm">로그인</a>
                <a th:if="${session.loginUser == null}" href="/users/register" class="btn btn-primary btn-sm">회원가입</a>
                <a th:if="${session.loginUser != null}" href="/users/logout" class="btn btn-outline-secondary btn-sm">로그아웃</a>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="site-footer">
    <div class="container d-flex flex-column flex-md-row justify-content-between gap-2">
        <span>Travory</span>
        <span>좋은 사람과 좋은 여행을 더 쉽게 만나는 공간</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</footer>

</body>
</html>
