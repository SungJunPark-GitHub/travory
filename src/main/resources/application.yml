server:
  port: 8080

spring:
  application:
    name: travory

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/travory_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.travory.app
  configuration:
    map-underscore-to-camel-case: true