<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('동행 모집 상세')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-8">
                <article class="surface-card p-4 p-md-5">
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
                        <span th:if="${post.status == 'OPEN'}" class="badge bg-success">모집중</span>
                        <span th:if="${post.status == 'CLOSED'}" class="badge bg-secondary">모집완료</span>
                        <span th:if="${post.status == 'FINISHED'}" class="badge bg-dark">여행종료</span>
                    </div>

                    <h1 class="h2 fw-bold mb-4" th:text="${post.title}"></h1>

                    <div class="row g-3 mb-4">
                        <div class="col-6 col-md-3">
                            <div class="stat-card">
                                <span class="stat-value" th:text="${post.viewCount}"></span>
                                <span class="stat-label">조회수</span>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="stat-card">
                                <span class="stat-value" th:text="${likeCount}"></span>
                                <span class="stat-label">좋아요</span>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="stat-card">
                                <span class="stat-value" th:text="${favoriteCount}"></span>
                                <span class="stat-label">북마크</span>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="stat-card">
                                <span class="stat-value" th:text="${participantCount}"></span>
                                <span class="stat-label">참여자</span>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <div class="p-3 bg-light rounded">
                                <strong>여행 기간</strong>
                                <p class="mb-0 mt-2">
                                    <span th:text="${post.startDate}"></span>
                                    ~
                                    <span th:text="${post.endDate}"></span>
                                </p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="p-3 bg-light rounded">
                                <strong>모집 인원</strong>
                                <p class="mb-0 mt-2">
                                    <span th:text="${post.maxPeople}"></span>
                                    <span>명</span>
                                </p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="p-3 bg-light rounded">
                                <strong>예상 비용</strong>
                                <p class="mb-0 mt-2" th:text="${post.budget}"></p>
                            </div>
                        </div>
                    </div>

                    <hr>

                    <div class="content-box fs-6" th:text="${post.content}"></div>
                </article>

                <section class="surface-card p-4 mt-4">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <h2 class="h4 fw-bold mb-0">여행 일정</h2>
                    </div>

                    <div th:if="${#lists.isEmpty(itineraryDays)}" class="alert alert-secondary mb-0">
                        아직 등록된 여행 일정이 없습니다.
                    </div>

                    <div class="row g-3" th:if="${!#lists.isEmpty(itineraryDays)}">
                        <div class="col-md-6" th:each="day : ${itineraryDays}">
                            <div class="p-3 bg-light rounded h-100">
                                <h3 class="h5 fw-bold">
                                    Day <span th:text="${day.dayNumber}"></span>
                                </h3>

                                <div th:if="${#lists.isEmpty(day.itemList)}" class="text-muted">
                                    등록된 일정 항목이 없습니다.
                                </div>

                                <ol class="mb-0" th:if="${!#lists.isEmpty(day.itemList)}">
                                    <li class="mb-2" th:each="item : ${day.itemList}">
                                        <strong th:text="${item.placeName}"></strong>
                                        <p class="mb-0 text-muted content-box" th:text="${item.memo}"></p>
                                    </li>
                                </ol>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="surface-card p-4 mt-4">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <h2 class="h4 fw-bold mb-0">댓글</h2>
                    </div>

                    <form action="/comments/create" method="post" th:if="${session.loginUser != null}">
                        <input type="hidden" name="postId" th:value="${post.id}">

                        <div class="mb-3">
                            <textarea name="content" class="form-control" rows="3" placeholder="댓글을 입력하세요"></textarea>
                        </div>

                        <button class="btn btn-primary">댓글 작성</button>
                    </form>

                    <div th:if="${session.loginUser == null}" class="alert alert-secondary">
                        댓글을 작성하려면 로그인이 필요합니다.
                    </div>

                    <div class="mt-4">
                        <div class="card mb-2 border-0 bg-light" th:each="comment : ${commentList}">
                            <div class="card-body">
                                <strong th:text="${comment.userName}"></strong>
                                <p class="mt-2 mb-3" th:text="${comment.content}"></p>

                                <form th:if="${session.loginUser != null and session.loginUser.id == comment.userId}"
                                      th:action="@{/comments/{id}/delete(id=${comment.id})}"
                                      method="post">
                                    <input type="hidden" name="postId" th:value="${post.id}">
                                    <button class="btn btn-sm btn-outline-danger">삭제</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col-lg-4">
                <div class="surface-card p-4 sticky-lg-top" style="top: 88px;">
                    <h2 class="h5 fw-bold mb-3">여행 참여</h2>

                    <div class="d-grid gap-2 mb-3">
                        <form th:if="${session.loginUser != null and !liked}"
                              th:action="@{/posts/{postId}/likes(postId=${post.id})}"
                              method="post">
                            <button type="submit" class="btn btn-outline-primary w-100">좋아요</button>
                        </form>

                        <form th:if="${session.loginUser != null and liked}"
                              th:action="@{/posts/{postId}/likes/delete(postId=${post.id})}"
                              method="post">
                            <button type="submit" class="btn btn-primary w-100">좋아요 취소</button>
                        </form>

                        <form th:if="${session.loginUser != null and !favorited}"
                              th:action="@{/posts/{postId}/favorites(postId=${post.id})}"
                              method="post">
                            <button type="submit" class="btn btn-outline-success w-100">북마크</button>
                        </form>

                        <form th:if="${session.loginUser != null and favorited}"
                              th:action="@{/posts/{postId}/favorites/delete(postId=${post.id})}"
                              method="post">
                            <button type="submit" class="btn btn-success w-100">북마크 취소</button>
                        </form>
                    </div>

                    <div th:if="${session.loginUser == null}" class="alert alert-secondary">
                        좋아요, 북마크, 동행 신청을 사용하려면 로그인이 필요합니다.
                    </div>

                    <div class="mb-3"
                         th:if="${session.loginUser != null and session.loginUser.id != post.userId and !applied}">
                        <form th:action="@{/posts/{postId}/requests(postId=${post.id})}" method="post">
                            <label for="companionMessage" class="form-label">동행 신청 메시지</label>
                            <textarea id="companionMessage"
                                      name="message"
                                      class="form-control"
                                      rows="4"
                                      placeholder="동행 신청 메시지를 입력하세요"></textarea>
                            <button type="submit" class="btn btn-primary w-100 mt-2">동행 신청</button>
                        </form>
                    </div>

                    <div class="alert alert-info"
                         th:if="${session.loginUser != null and session.loginUser.id != post.userId and applied}">
                        이미 동행 신청을 보냈습니다.
                    </div>

                    <div th:if="${session.loginUser != null and session.loginUser.id == post.userId}">
                        <div class="alert alert-light border">
                            이 모집글의 작성자입니다.
                        </div>

                        <form th:action="@{/posts/{id}/status(id=${post.id})}" method="post" class="mb-3">
                            <label class="form-label">모집 상태</label>
                            <select name="status" class="form-select mb-2">
                                <option value="OPEN" th:selected="${post.status == 'OPEN'}">모집중</option>
                                <option value="CLOSED" th:selected="${post.status == 'CLOSED'}">모집완료</option>
                                <option value="FINISHED" th:selected="${post.status == 'FINISHED'}">여행종료</option>
                            </select>
                            <button type="submit" class="btn btn-outline-primary w-100">상태 변경</button>
                        </form>

                        <div class="d-grid gap-2">
                            <a th:href="@{/posts/{id}/itinerary(id=${post.id})}" class="btn btn-outline-primary">여행 일정 관리</a>
                            <a th:href="@{/posts/{id}/requests(id=${post.id})}" class="btn btn-outline-primary">동행 신청 관리</a>
                            <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-warning">수정</a>
                        </div>

                        <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" class="mt-2">
                            <button type="submit" class="btn btn-outline-danger w-100"
                                    onclick="return confirm('정말 삭제하시겠습니까?')">
                                삭제
                            </button>
                        </form>
                    </div>

                    <a href="/posts" class="btn btn-outline-secondary w-100 mt-3">목록</a>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
