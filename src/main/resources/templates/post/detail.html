<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>동행 모집 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 th:text="${post.title}"></h2>

    <div class="mb-3 text-muted">
        <span>조회수: </span>
        <span th:text="${post.viewCount}"></span>
    </div>

    <div class="mb-3">
        <strong>여행 기간</strong>
        <p>
            <span th:text="${post.startDate}"></span>
            ~
            <span th:text="${post.endDate}"></span>
        </p>
    </div>

    <div class="mb-3">
        <strong>모집 인원</strong>
        <p th:text="${post.maxPeople}"></p>
    </div>

    <div class="mb-3">
        <strong>예상 비용</strong>
        <p th:text="${post.budget}"></p>
    </div>

    <hr>

    <div class="mb-3">
        <p th:text="${post.content}"></p>
    </div>

    <hr>

    <h4>댓글</h4>

    <form action="/comments/create" method="post" th:if="${session.loginUser != null}">
        <input type="hidden" name="postId" th:value="${post.id}">

        <div class="mb-3">
            <textarea name="content" class="form-control" rows="3" placeholder="댓글을 입력하세요"></textarea>
        </div>

        <button class="btn btn-primary">댓글 작성</button>
    </form>

    <div th:if="${session.loginUser == null}" class="alert alert-secondary">
        댓글을 작성하려면 로그인이 필요합니다.
    </div>

    <div class="mt-4">
        <div class="card mb-2" th:each="comment : ${commentList}">
            <div class="card-body">
                <strong th:text="${comment.userName}"></strong>
                <p class="mt-2" th:text="${comment.content}"></p>

                <form th:if="${session.loginUser != null and session.loginUser.id == comment.userId}"
                      th:action="@{/comments/{id}/delete(id=${comment.id})}"
                      method="post">
                    <input type="hidden" name="postId" th:value="${post.id}">
                    <button class="btn btn-sm btn-danger">삭제</button>
                </form>
            </div>
        </div>
    </div>

    <a href="/posts" class="btn btn-secondary">목록</a>
</div>

<div th:if="${session.loginUser != null and session.loginUser.id == post.userId}">
    <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-warning">수정</a>

    <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-danger"
                onclick="return confirm('정말 삭제하시겠습니까?')">
            삭제
        </button>
    </form>
</div>

</body>
</html>
