<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('내 북마크')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
            <div>
                <span class="badge badge-soft mb-3">Saved trips</span>
                <h1 class="h2 fw-bold mb-2">내 북마크</h1>
                <p class="lead-muted mb-0">관심 있는 동행 모집글을 한곳에서 확인하세요.</p>
            </div>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-secondary">홈</a>
                <a href="/posts" class="btn btn-primary">동행 모집 목록</a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(favoriteList)}" class="surface-card p-5 text-center">
            <h2 class="h5 fw-bold">북마크한 게시글이 없습니다.</h2>
            <p class="lead-muted mb-4">마음에 드는 여행 모집글을 북마크하면 이곳에 모입니다.</p>
            <a href="/posts" class="btn btn-primary">모집글 둘러보기</a>
        </div>

        <div th:if="${!#lists.isEmpty(favoriteList)}" class="surface-card overflow-hidden">
            <div class="p-3 border-bottom bg-white">
                <strong>북마크한 여행 카드</strong>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>제목</th>
                        <th>작성자</th>
                        <th>기간</th>
                        <th>모집인원</th>
                        <th>조회수</th>
                        <th>북마크일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="post : ${favoriteList}">
                        <td class="text-muted" th:text="${post.id}"></td>
                        <td>
                            <a class="post-title-link"
                               th:href="@{/posts/{id}(id=${post.id})}"
                               th:text="${post.title}"></a>
                        </td>
                        <td th:text="${post.user_name}"></td>
                        <td>
                            <span th:text="${post.start_date}"></span>
                            ~
                            <span th:text="${post.end_date}"></span>
                        </td>
                        <td th:text="${post.max_people}"></td>
                        <td th:text="${post.view_count}"></td>
                        <td th:text="${post.favorited_at}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
