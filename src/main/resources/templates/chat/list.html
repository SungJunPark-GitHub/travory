<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('내 채팅')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
    <div class="container">
        <div class="surface-card p-4 p-md-5 mb-4">
            <span class="badge badge-soft mb-3">My Chats</span>
            <h1 class="h2 fw-bold mb-2">내 채팅</h1>
            <p class="lead-muted mb-0">내가 참여할 수 있는 여행 채팅방을 확인하세요.</p>
        </div>

        <div th:if="${#lists.isEmpty(chatRoomList)}" class="alert alert-secondary">
            참여 가능한 채팅방이 없습니다.
        </div>

        <div class="row g-3" th:if="${!#lists.isEmpty(chatRoomList)}">
            <div class="col-md-6" th:each="room : ${chatRoomList}">
                <article class="surface-card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                        <div>
                            <div class="small text-muted">
                                Post #<span th:text="${room.postId}"></span>
                            </div>
                            <h2 class="h5 fw-bold mb-0" th:text="${room.title}"></h2>
                        </div>
                        <span th:if="${room.role == 'OWNER'}" class="badge bg-primary">OWNER</span>
                        <span th:if="${room.role == 'COMPANION'}" class="badge bg-success">COMPANION</span>
                    </div>

                    <div class="small text-muted mb-3">
                        <span th:text="${room.startDate}"></span>
                        ~
                        <span th:text="${room.endDate}"></span>
                    </div>

                    <div class="p-3 bg-light rounded mb-3">
                        <div class="small text-muted mb-1">최근 메시지</div>
                        <p class="mb-1 content-box"
                           th:if="${room.latestMessageContent != null}"
                           th:text="${room.latestMessageContent}"></p>
                        <p class="mb-1 text-muted"
                           th:if="${room.latestMessageContent == null}">
                            아직 메시지가 없습니다.
                        </p>
                        <div class="small text-muted"
                             th:if="${room.latestMessageCreatedAt != null}"
                             th:text="${room.latestMessageCreatedAt}"></div>
                    </div>

                    <a th:href="@{/posts/{postId}/chat(postId=${room.postId})}"
                       class="btn btn-primary w-100">
                        채팅방 입장
                    </a>
                </article>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
