<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('알림')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
    <div class="container">
        <div class="surface-card p-4 p-md-5 mb-4">
            <div class="d-flex flex-column flex-md-row justify-content-between gap-3">
                <div>
                    <span class="badge badge-soft mb-3">Notifications</span>
                    <h1 class="h2 fw-bold mb-2">알림</h1>
                    <p class="lead-muted mb-0">동행 신청, 승인, 댓글 소식을 확인하세요.</p>
                </div>

                <form action="/notifications/read-all" method="post">
                    <button type="submit" class="btn btn-primary">모두 읽음</button>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(notificationList)}" class="surface-card p-5 text-center">
            <h2 class="h5 fw-bold">아직 알림이 없습니다.</h2>
            <p class="lead-muted mb-0">새로운 활동이 생기면 이곳에 표시됩니다.</p>
        </div>

        <div class="d-grid gap-3" th:if="${!#lists.isEmpty(notificationList)}">
            <div th:each="notification : ${notificationList}"
                 class="surface-card p-4"
                 th:classappend="${notification.isRead == false} ? ' border-primary'">
                <div class="d-flex flex-column flex-md-row justify-content-between gap-3">
                    <div>
                        <span th:if="${notification.isRead == false}" class="badge bg-primary mb-2">NEW</span>
                        <span class="badge bg-secondary mb-2" th:text="${notification.type}"></span>
                        <h2 class="h6 fw-bold mb-2" th:text="${notification.message}"></h2>
                        <div class="small text-muted" th:text="${notification.createdAt}"></div>
                    </div>

                    <div class="d-flex flex-wrap align-items-start gap-2">
                        <a th:href="${notification.targetUrl}" class="btn btn-outline-primary btn-sm">이동</a>

                        <form th:if="${notification.isRead == false}"
                              th:action="@{/notifications/{id}/read(id=${notification.id})}"
                              method="post">
                            <button type="submit" class="btn btn-primary btn-sm">읽음</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
