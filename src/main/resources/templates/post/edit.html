<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>동행 모집 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>동행 모집 수정</h2>

    <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="post">
        <div class="mb-3">
            <label>제목</label>
            <input type="text" name="title" class="form-control" th:value="${post.title}">
        </div>

        <div class="mb-3">
            <label>내용</label>
            <textarea name="content" class="form-control" rows="5" th:text="${post.content}"></textarea>
        </div>

        <div class="mb-3">
            <label>여행 시작일</label>
            <input type="date" name="startDate" class="form-control" th:value="${post.startDate}">
        </div>

        <div class="mb-3">
            <label>여행 종료일</label>
            <input type="date" name="endDate" class="form-control" th:value="${post.endDate}">
        </div>

        <div class="mb-3">
            <label>모집 인원</label>
            <input type="number" name="maxPeople" class="form-control" th:value="${post.maxPeople}">
        </div>

        <div class="mb-3">
            <label>예상 비용</label>
            <input type="number" name="budget" class="form-control" th:value="${post.budget}">
        </div>

        <button class="btn btn-primary">수정 완료</button>
        <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-secondary">취소</a>
    </form>
</div>

</body>
</html>
