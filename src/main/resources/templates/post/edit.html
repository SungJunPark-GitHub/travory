<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('동행 모집 수정')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="page-shell">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="surface-card p-4 p-md-5">
                    <div class="travel-visual mb-4"></div>
                    <div class="mb-4">
                        <span class="badge badge-soft mb-3">Edit trip</span>
                        <h1 class="h3 fw-bold">동행 모집 수정</h1>
                        <p class="lead-muted mb-0">모집 내용과 여행 정보를 최신 상태로 정리하세요.</p>
                    </div>

                    <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="post" class="form-section">
                        <div class="mb-3">
                            <label class="form-label">제목</label>
                            <input type="text" name="title" class="form-control" th:value="${post.title}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">내용</label>
                            <textarea name="content" class="form-control" rows="6" th:text="${post.content}"></textarea>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">여행 시작일</label>
                                <input type="date" name="startDate" class="form-control" th:value="${post.startDate}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">여행 종료일</label>
                                <input type="date" name="endDate" class="form-control" th:value="${post.endDate}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">모집 인원</label>
                                <input type="number" name="maxPeople" class="form-control" th:value="${post.maxPeople}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">예상 비용</label>
                                <input type="number" name="budget" class="form-control" th:value="${post.budget}">
                            </div>
                        </div>

                        <div class="d-flex flex-wrap gap-2 mt-4">
                            <button class="btn btn-primary">수정 완료</button>
                            <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-outline-secondary">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
